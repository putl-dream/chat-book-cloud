services:
  # --- 1. 注册中心与配置中心 ---
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: nacos-dev
    restart: always
    environment:
      - MODE=standalone
      - JVM_XMS=256m
      - JVM_XMX=256m
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - chat-book-net

  # --- 2. 数据库 (关键修正) ---
  mysql:
    image: mysql:8.0
    container_name: mysql-dev
    restart: always
    # 强制容器使用 mysql 用户运行，确保有权读取宿主机 data 目录
    user: "999:999"
    environment:
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - chat-book-net

  # --- 3. 缓存 ---
  redis:
    image: redis:7.0
    container_name: redis-dev
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - chat-book-net

  # --- 4. 消息队列 ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    hostname: rabbit-server
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin@2026
    volumes:
      - ./data/rabbitmq/data:/var/lib/rabbitmq
      - ./data/rabbitmq/logs:/var/log/rabbitmq
      - ./data/rabbitmq/conf/enabled_plugins:/etc/rabbitmq/enabled_plugins
    networks:
      - chat-book-net

  # --- 5. 对象存储 ---
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=admin@2026
    volumes:
      - ./data/minio/data:/data
      - ./data/minio/config:/root/.minio
    networks:
      - chat-book-net

  # --- 6. 网关服务 ---
  gateway:
    image: chat-book-cloud-gateway:local
    container_name: gateway
    build: ./chat-book-cloud-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos-dev:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos-dev:8848
    depends_on:
      - nacos
    networks:
      - chat-book-net

  # --- 7. 认证服务 (连接用户库) ---
  auth:
    image: chat-book-cloud-auth:local
    container_name: auth
    build: ./chat-book-cloud-auth
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos-dev:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos-dev:8848
      # 修改为指向 ice_user 库
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-dev:3306/ice_user?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
      - SPRING_DATA_REDIS_HOST=redis-dev
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin@2026
    depends_on:
      - mysql
    networks:
      - chat-book-net

  # --- 8. 用户服务 (连接用户库) ---
  user:
    image: chat-book-cloud-user:local
    container_name: user
    build: ./chat-book-cloud-user
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos-dev:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos-dev:8848
      # 修改为指向 ice_user 库
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-dev:3306/ice_user?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
      - SPRING_DATA_REDIS_HOST=redis-dev
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin@2026
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=admin@2026
    depends_on:
      - mysql
    networks:
      - chat-book-net

  # --- 9. 文章服务 (连接文章库) ---
  article:
    image: chat-book-cloud-article:local
    container_name: article
    build: ./chat-book-cloud-article
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos-dev:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos-dev:8848
      # 修改为指向 ice-article 库
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-dev:3306/ice-article?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
      - SPRING_DATA_REDIS_HOST=redis-dev
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin@2026
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=admin@2026
    depends_on:
      - mysql
    networks:
      - chat-book-net

  # --- 10. 前端服务 ---
  frontend:
    image: chat-book-ui-blog:local
    container_name: frontend
    build: ./chat-book-ui-blog
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - chat-book-net

networks:
  chat-book-net:
    driver: bridge