name: CI and Deploy

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  qodana:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.3
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: false
          use-caches: true
          post-pr-comment: true
          use-annotations: true
          upload-result: false
          push-fixes: "none"

  java-ci:
    if: github.event_name == 'pull_request'
    needs: qodana
    runs-on: ubuntu-latest
    env:
      FILE_STORAGE_BASE_URL: ${{ vars.FILE_STORAGE_BASE_URL || '' }}
      MINIO_ENDPOINT: ${{ vars.MINIO_ENDPOINT || 'http://localhost:9000' }}
      MINIO_ACCESS_KEY: ${{ vars.MINIO_ACCESS_KEY || 'admin' }}
      MINIO_SECRET_KEY: ${{ vars.MINIO_SECRET_KEY || 'admin@2026' }}
      MINIO_BUCKET: ${{ vars.MINIO_BUCKET || 'chat-book-images' }}
      MINIO_PUBLIC_URL: ${{ vars.MINIO_PUBLIC_URL || 'http://localhost:9000' }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
      rabbitmq:
        image: rabbitmq:management
        env:
          RABBITMQ_DEFAULT_USER: admin
          RABBITMQ_DEFAULT_PASS: admin@2026
        ports:
          - 5672:5672
          - 15672:15672
        options: --health-cmd "rabbitmq-diagnostics -q ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Start MinIO
        run: |
          docker run -d -p 9000:9000 -p 9001:9001 --name minio \
            -e MINIO_ROOT_USER=admin -e MINIO_ROOT_PASSWORD=admin@2026 \
            minio/minio server /data --console-address ":9001"

          echo "Waiting for MinIO..."
          timeout=60
          while ! curl -s http://localhost:9000/minio/health/live > /dev/null; do
            timeout=$((timeout-1))
            if [ $timeout -eq 0 ]; then
              echo "MinIO startup timed out"
              exit 1
            fi
            sleep 1
          done
          echo "MinIO is up!"

      - name: Initialize Databases
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS \`ice_user\`; CREATE DATABASE IF NOT EXISTS \`ice-article\`; CREATE DATABASE IF NOT EXISTS \`chat_book_interaction\`; CREATE DATABASE IF NOT EXISTS \`chat_book_user\`;"
          mysql -h 127.0.0.1 -u root -proot -e "USE chat_book_user; CREATE TABLE IF NOT EXISTS user_foot (id INT AUTO_INCREMENT PRIMARY KEY, user_id INT, document_id INT, document_type INT, document_user_id INT, collection_stat INT, read_stat INT, comment_stat INT, praise_stat INT, create_time DATETIME, update_time DATETIME); CREATE TABLE IF NOT EXISTS review (id INT AUTO_INCREMENT PRIMARY KEY, text_id INT, user_id INT, parent_id INT, content TEXT, create_time DATETIME, update_time DATETIME);"
          mysql -h 127.0.0.1 -u root -proot < chat-book-cloud-interaction/src/main/resources/db/migration/V1__init_interaction_database.sql
          mysql -h 127.0.0.1 -u root -proot < chat-book-cloud-interaction/src/main/resources/db/migration/V2__migrate_data_from_user_service.sql

      - name: Build with Maven
        run: mvn -B test --file pom.xml

  build-and-deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FILE_STORAGE_BASE_URL: ${{ vars.FILE_STORAGE_BASE_URL || '' }}
      VITE_APP_BASE_URL: ${{ vars.VITE_APP_BASE_URL || '' }}
      MINIO_ENDPOINT: ${{ vars.MINIO_ENDPOINT || '' }}
      MINIO_ACCESS_KEY: ${{ vars.MINIO_ACCESS_KEY || '' }}
      MINIO_SECRET_KEY: ${{ vars.MINIO_SECRET_KEY || '' }}
      MINIO_BUCKET: ${{ vars.MINIO_BUCKET || '' }}
      MINIO_PUBLIC_URL: ${{ vars.MINIO_PUBLIC_URL || '' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build Backend with Maven
        run: mvn clean package -DskipTests -B

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: chat-book-ui-blog/package-lock.json

      - name: Build Frontend
        run: |
          cd chat-book-ui-blog
          npm install
          npm run build

      - name: Prepare Deployment Artifacts
        run: |
          mkdir -p deploy/chat-book-cloud-gateway/target
          mkdir -p deploy/chat-book-cloud-auth/target
          mkdir -p deploy/chat-book-cloud-user/target
          mkdir -p deploy/chat-book-cloud-article/target
          mkdir -p deploy/chat-book-cloud-interaction/target
          mkdir -p deploy/chat-book-ui-blog/dist

          cp chat-book-cloud-gateway/target/*.jar deploy/chat-book-cloud-gateway/target/
          cp chat-book-cloud-auth/target/*.jar deploy/chat-book-cloud-auth/target/
          cp chat-book-cloud-user/target/*.jar deploy/chat-book-cloud-user/target/
          cp chat-book-cloud-article/target/*.jar deploy/chat-book-cloud-article/target/
          cp chat-book-cloud-interaction/target/*.jar deploy/chat-book-cloud-interaction/target/

          cp chat-book-cloud-gateway/Dockerfile deploy/chat-book-cloud-gateway/
          cp chat-book-cloud-auth/Dockerfile deploy/chat-book-cloud-auth/
          cp chat-book-cloud-user/Dockerfile deploy/chat-book-cloud-user/
          cp chat-book-cloud-article/Dockerfile deploy/chat-book-cloud-article/
          cp chat-book-cloud-interaction/Dockerfile deploy/chat-book-cloud-interaction/
          cp chat-book-ui-blog/Dockerfile deploy/chat-book-ui-blog/

          cp chat-book-ui-blog/nginx.conf deploy/chat-book-ui-blog/
          cp -r chat-book-ui-blog/dist/* deploy/chat-book-ui-blog/dist/

          cp docker-compose.yml deploy/
          cp init.sql deploy/
          cp run_sql.sh deploy/

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "deploy/*"
          target: "/home/${{ secrets.SERVER_USER }}/chat-book-cloud/"
          strip_components: 1

      - name: Start Services via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/chat-book-cloud/
            docker-compose up -d --build --remove-orphans
            docker image prune -f
