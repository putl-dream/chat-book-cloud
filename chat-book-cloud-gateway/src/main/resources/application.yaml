spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
  main:
    allow-bean-definition-overriding: true
  codec:
    max-in-memory-size: -1
  cloud:
    # Spring Cloud Gateway 配置项，对应 GatewayProperties 类
    gateway:
      globalcors:
        cors-configurations:
          "[/**]": # 允许跨域的请求
            allowedOriginPatterns: # 使用模式匹配允许的源
              - "http://*"
              - "https://*"
              - "ws://*"
            allowedMethods: # 支持的请求方法
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*" # 允许所有请求头
            allowCredentials: true # 允许携带凭证（如 cookies）
            max-age: 3600
        add-to-simple-url-handler-mapping: true
      default-filters:
      routes:
        # ==================== 统一前缀路由配置 ====================
        # 格式规范: /api/{service-name}/* → StripPrefix=1
        # 路由规则: Path=/api/xxx/** → 裁剪后传递 /xxx/** 给下游服务

        # 认证服务 - /api/auth/**
        - id: auth-service
          uri: lb://auth-server
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        # 文章服务核心业务 - /api/article/**, /api/page/**
        - id: article-service
          uri: lb://article-service
          predicates:
            - Path=/api/article/**,/api/page/**
          filters:
            - StripPrefix=1

        # 文章静态资源服务 - /api/file/**, /api/images/**, /api/videos/**
        - id: article-service-static
          uri: lb://article-service
          predicates:
            - Path=/api/file/**,/api/images/**,/api/videos/**
          filters:
            - StripPrefix=1
            - RewritePath=/api/file/(?<segment>.*),/article/file/$\{segment}

        # 用户服务 - /api/user/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1

        # 聊天服务 - /api/chat/**
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**
          filters:
            - StripPrefix=1

        # 互动服务 - /api/interaction/**
        - id: interaction-service
          uri: lb://interaction-service
          predicates:
            - Path=/api/interaction/**
          filters:
            - StripPrefix=1

        # 社交服务 - /api/social/**
        - id: social-service
          uri: lb://social-service
          predicates:
            - Path=/api/social/**
          filters:
            - StripPrefix=1

        # ==================== WebSocket 路由配置 ====================
        # Article 服务 WebSocket
        - id: article-service-websocket
          uri: lb://article-service
          predicates:
            - Path=/api/article/ws
          filters:
            - StripPrefix=1

        # Chat 服务 WebSocket
        - id: chat-service-websocket
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/ws
          filters:
            - StripPrefix=1
