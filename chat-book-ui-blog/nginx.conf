server {
    listen 80;
    server_name localhost;

    # 开启 Gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/json image/svg+xml;
    gzip_vary on;

    root /usr/share/nginx/html;
    index index.html;

    # 1. 前端路由支持 (SPA Fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. 新增：拦截图片和文件桶的请求，转发给 MinIO
    # 这样访问 http://amireux.fun/chat-book-images/... 就能看到图片
    location ~ ^/(chat-book-images|chat-book-files)/ {
        proxy_pass http://minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. 反向代理到 Gateway 网关
    location ~ ^/(auth|user|article|page|images|videos) {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 增加缓冲和超时配置，防止 502
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}