server {
    listen 80;
    server_name localhost;

    # 开启 Gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/json image/svg+xml;
    gzip_vary on;

    root /usr/share/nginx/html;
    index index.html;

    # 前端路由支持 (SPA Fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反向代理到 Gateway
    # 匹配 /auth, /user, /article, /page, /images, /videos 开头的请求
    location ~ ^/(auth|user|article|page|images|videos)/ {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 解决 WebSocket 连接问题 (如果有)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
