--- ###==================== Nacos 注册中心 ====================
spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848} # 注册中心地址
        namespace: ${NACOS_NAMESPACE:putl} # 命名空间
#        username: nacos # 用户名
#        password: nacos # 密码

--- ###==================== Nacos 配置中心 ====================
spring:
  cloud:
    nacos:
      config:
        #        username: nacos # 用户名
        #        password: nacos # 密码
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848} # 配置中心地址
        namespace: ${NACOS_CONFIG_NAMESPACE:public} # 命名空间
        group: ${NACOS_GROUP:DEFAULT_GROUP} # 组名
        file-extension: yaml # 文件后缀
        shared-configs:
          - data-id: common.yaml
            group: ${NACOS_GROUP:DEFAULT_GROUP}
            refresh: true
